<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal from the Noise — Real-World Data & Evidence | Excelra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F7FB; --surface:#FFFFFF; --surface-2:#FBFCFE;
  --ink:#131B2E; --ink-soft:#5A6781; --ink-faint:#8C97AE;
  --line:#E3E9F2; --line-soft:#EEF2F8;
  --noise:#B7C0D4;
  --signal:#11B5C4; --violet:#6C5CE7; --magenta:#E84F9C;
  --success:#15B57E; --warn:#E9683C;
  --grad:linear-gradient(90deg,#11B5C4 0%,#6C5CE7 52%,#E84F9C 100%);
  --shadow:0 1px 2px rgba(19,27,46,.04),0 8px 24px rgba(19,27,46,.06);
  --shadow-lg:0 12px 40px rgba(19,27,46,.12);
  --r:14px; --r-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  line-height:1.6;-webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',monospace}
h1,h2,h3,h4,.display{font-family:'Space Grotesk',sans-serif;line-height:1.15;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- App layout ---------- */
.app{display:grid;grid-template-columns:288px 1fr;min-height:100vh}
.sidebar{
  background:var(--surface);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.main{display:flex;flex-direction:column;min-width:0}

/* ---------- Brand / sidebar ---------- */
.brand{padding:22px 22px 16px;border-bottom:1px solid var(--line-soft)}
.brand .logo{font-family:'Space Grotesk';font-weight:700;font-size:21px;letter-spacing:-.02em;color:var(--ink)}
.brand .logo span{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand .kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px;font-weight:600}

.nav{padding:14px 12px;flex:1}
.nav .nav-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;padding:6px 10px 10px}
.mod{
  display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--r-sm);
  cursor:pointer;transition:background .15s;margin-bottom:2px;width:100%;text-align:left;
}
.mod:hover{background:var(--surface-2)}
.mod.active{background:linear-gradient(90deg,rgba(17,181,196,.10),rgba(108,92,231,.06))}
.mod.active .mod-num{background:var(--grad);color:#fff;border-color:transparent}
.mod.locked{opacity:.5;cursor:not-allowed}
.mod-num{
  flex:none;width:26px;height:26px;border-radius:8px;border:1.5px solid var(--line);
  display:grid;place-items:center;font-family:'IBM Plex Mono';font-size:12px;font-weight:500;
  color:var(--ink-soft);background:var(--surface);transition:.15s;
}
.mod.done .mod-num{background:var(--success);border-color:transparent;color:#fff}
.mod-label{font-size:13.5px;font-weight:500;color:var(--ink);flex:1;min-width:0}
.mod.locked .mod-label{color:var(--ink-faint)}
.mod-ico{flex:none;color:var(--ink-faint);font-size:13px}

/* ---------- HUD header ---------- */
.hud{
  background:var(--surface);border-bottom:1px solid var(--line);
  padding:14px 28px 0;position:sticky;top:0;z-index:20;
}
.hud-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.hud-stats{display:flex;gap:10px;margin-left:auto;align-items:center}
.stat{
  display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--line);
  padding:6px 12px;border-radius:999px;font-size:13px;font-weight:600;
}
.stat .dot{width:8px;height:8px;border-radius:50%}
.stat.xp .dot{background:var(--signal)}
.stat.lvl .dot{background:var(--violet)}
.stat.badge .dot{background:var(--magenta)}
.stat b{font-family:'IBM Plex Mono';font-weight:600}
.menu-btn{display:none}

/* waveform progress signature */
.wave-wrap{padding:10px 0 12px;position:relative}
.wave-wrap svg{display:block;width:100%;height:46px;overflow:visible}
.wave-meta{display:flex;justify-content:space-between;font-size:10.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-top:-2px}
.wave-meta .pct{color:var(--signal);font-family:'IBM Plex Mono'}

/* ---------- Content ---------- */
.scroll{flex:1;overflow-y:auto}
.page{max-width:780px;margin:0 auto;padding:38px 28px 90px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--violet);font-weight:600;margin-bottom:14px}
.eyebrow .mono{font-size:12px;color:var(--ink-faint)}
.page h1{font-size:38px;font-weight:700;margin-bottom:14px}
.page h1 em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.lead{font-size:18px;color:var(--ink-soft);margin-bottom:26px;max-width:62ch}
.page h2{font-size:23px;font-weight:600;margin:36px 0 12px}
.page h3{font-size:17px;font-weight:600;margin:24px 0 8px}
.page p{margin-bottom:14px;color:#28324A}
.page p.muted{color:var(--ink-soft)}

/* narration bar */
.narrate{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:7px 8px 7px 16px;margin-bottom:26px;box-shadow:var(--shadow);width:fit-content}
.narrate .play{width:34px;height:34px;border-radius:50%;background:var(--grad);color:#fff;display:grid;place-items:center;flex:none}
.narrate .play:active{transform:scale(.94)}
.narrate .ntxt{font-size:13px;font-weight:600;color:var(--ink-soft)}
.narrate .ntxt b{color:var(--ink)}

/* callouts & cards */
.callout{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--signal);
  border-radius:var(--r-sm);padding:16px 18px;margin:20px 0;box-shadow:var(--shadow)}
.callout.violet{border-left-color:var(--violet)}
.callout.magenta{border-left-color:var(--magenta)}
.callout .co-t{font-weight:600;font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.callout p{margin:0;font-size:14.5px;color:var(--ink-soft)}

.cards2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0}
.cards3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin:20px 0}
.dcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.dcard .dc-tag{font-family:'IBM Plex Mono';font-size:11px;font-weight:500;letter-spacing:.04em;
  padding:3px 9px;border-radius:6px;display:inline-block;margin-bottom:10px}
.dcard.rwd .dc-tag{background:rgba(17,181,196,.12);color:#0a7c87}
.dcard.rwe .dc-tag{background:rgba(232,79,156,.12);color:#b32d6e}
.dcard.vlt .dc-tag{background:rgba(108,92,231,.12);color:#4a3db0}
.dcard h4{font-size:16px;margin-bottom:6px}
.dcard p{font-size:13.5px;color:var(--ink-soft);margin:0}

/* flashcards (Module 4) */
.flash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin:20px 0}
.flash-card{perspective:1200px;height:140px;cursor:pointer}
.flash-card .fc-inner{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);
  transform-style:preserve-3d}
.flash-card.flipped .fc-inner{transform:rotateY(180deg)}
.flash-card .fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);
  padding:16px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);border:1px solid var(--line)}
.flash-card .fc-front{background:var(--surface)}
.flash-card .fc-front .fc-num{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--ink-faint);margin-bottom:6px}
.flash-card .fc-front .fc-term{font-family:'Space Grotesk';font-size:16.5px;font-weight:700;color:var(--ink)}
.flash-card .fc-front .fc-hint{font-size:11.5px;color:var(--ink-faint);margin-top:8px}
.flash-card .fc-back{background:var(--grad);transform:rotateY(180deg);color:#fff}
.flash-card .fc-back p{font-size:12.5px;line-height:1.45;margin:0}

.obj-list{list-style:none;margin:8px 0 4px}
.obj-list li{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-soft);align-items:flex-start}
.obj-list li:last-child{border-bottom:none}
.obj-list .on{flex:none;width:24px;height:24px;border-radius:7px;background:var(--surface-2);border:1px solid var(--line);
  display:grid;place-items:center;font-family:'IBM Plex Mono';font-size:12px;color:var(--violet);font-weight:600}
.obj-list li span{font-size:15px;color:#28324A}

/* knowledge check */
.kc{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin:30px 0 10px;box-shadow:var(--shadow)}
.kc .kc-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.kc .kc-badge{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--violet)}
.kc .kc-xp{margin-left:auto;font-family:'IBM Plex Mono';font-size:12px;color:var(--signal);font-weight:600}
.kc .q{font-size:16.5px;font-weight:600;margin:6px 0 16px;font-family:'Space Grotesk'}
.opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:13px 15px;
  border:1.5px solid var(--line);border-radius:var(--r-sm);margin-bottom:9px;background:var(--surface-2);
  transition:.14s;font-size:14.5px;color:var(--ink)}
.opt:hover:not(:disabled){border-color:var(--violet);background:#fff}
.opt .ok{flex:none;width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);
  display:grid;place-items:center;font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-faint)}
.opt.correct{border-color:var(--success);background:rgba(21,181,126,.07)}
.opt.correct .ok{background:var(--success);border-color:transparent;color:#fff}
.opt.wrong{border-color:var(--warn);background:rgba(233,104,60,.06)}
.opt.wrong .ok{background:var(--warn);border-color:transparent;color:#fff}
.opt:disabled{cursor:default}
.kc-fb{margin-top:6px;padding:13px 15px;border-radius:var(--r-sm);font-size:14px;display:none}
.kc-fb.show{display:block}
.kc-fb.good{background:rgba(21,181,126,.09);color:#0c7a52}
.kc-fb.bad{background:rgba(233,104,60,.09);color:#b14620}
.kc-fb b{font-weight:600}

/* footer nav */
.pagenav{display:flex;justify-content:space-between;gap:12px;margin-top:34px;padding-top:22px;border-top:1px solid var(--line)}
.btn{display:inline-flex;align-items:center;gap:9px;padding:12px 20px;border-radius:var(--r-sm);font-weight:600;font-size:14.5px;transition:.15s}
.btn.ghost{color:var(--ink-soft);border:1px solid var(--line);background:var(--surface)}
.btn.ghost:hover{border-color:var(--ink-soft);color:var(--ink)}
.btn.prim{background:var(--grad);color:#fff;box-shadow:0 6px 18px rgba(108,92,231,.28)}
.btn.prim:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn.prim:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;filter:none}
.btn.prim:disabled .lk{display:inline}
.btn .lk{display:none}

/* svg diagram */
.diagram{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin:22px 0;box-shadow:var(--shadow)}
.diagram .dg-cap{font-size:12.5px;color:var(--ink-faint);text-align:center;margin-top:12px;font-style:italic}

/* locked / placeholder page */
.locked-page{max-width:560px;margin:0 auto;padding:90px 28px;text-align:center}
.locked-page .lk-ico{width:64px;height:64px;border-radius:18px;background:var(--surface);border:1px solid var(--line);
  display:grid;place-items:center;margin:0 auto 20px;box-shadow:var(--shadow);color:var(--ink-faint)}
.locked-page h2{font-size:24px;margin-bottom:10px}
.locked-page p{color:var(--ink-soft)}

/* toast */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none}
.toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:999px;font-size:14px;font-weight:600;
  display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:pop .35s cubic-bezier(.2,1.2,.3,1)}
.toast .ti{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:14px}
.toast.xp .ti{background:var(--signal)}
.toast.badge .ti{background:var(--magenta)}
.toast.lvl .ti{background:var(--violet)}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.92)}to{opacity:1;transform:none}}

/* welcome modal */
.modal-bg{position:fixed;inset:0;background:rgba(19,27,46,.55);backdrop-filter:blur(4px);z-index:200;display:grid;place-items:center;padding:20px}
.modal{background:var(--surface);border-radius:20px;max-width:460px;width:100%;padding:34px;box-shadow:var(--shadow-lg);text-align:center}
.modal h2{font-size:25px;margin-bottom:8px}
.modal p{color:var(--ink-soft);margin-bottom:20px;font-size:15px}
.modal input{width:100%;padding:13px 16px;border:1.5px solid var(--line);border-radius:var(--r-sm);font-family:inherit;font-size:15px;margin-bottom:14px;text-align:center}
.modal input:focus{outline:none;border-color:var(--violet)}
.modal .wave-hero{height:54px;margin-bottom:18px}

/* ---------- Pre-course gate ---------- */
.gate-bg{position:fixed;inset:0;background:linear-gradient(135deg,#0E1626,#1B1438);z-index:300;
  display:grid;place-items:center;padding:24px}
.gate-card{background:var(--surface);border-radius:22px;max-width:560px;width:100%;padding:40px;
  box-shadow:0 24px 70px rgba(0,0,0,.35);text-align:center}
.gate-card .wave-hero{height:50px;margin-bottom:6px}
.gate-card h2{font-size:25px;margin-bottom:8px}
.gate-card p{color:var(--ink-soft);font-size:14.5px;margin-bottom:24px}
.level-grid{display:grid;gap:11px;text-align:left}
.level-card{display:flex;align-items:center;gap:14px;padding:16px 18px;border:1.5px solid var(--line);
  border-radius:var(--r);background:var(--surface-2);transition:.15s;width:100%;cursor:pointer;font-family:inherit}
.level-card:hover{border-color:var(--violet);background:#fff;transform:translateY(-1px)}
.level-card .lc-ico{flex:none;width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
  font-size:17px;background:var(--surface);border:1px solid var(--line)}
.level-card .lc-t{font-weight:600;font-size:14.5px;color:var(--ink)}
.level-card .lc-d{font-size:12.5px;color:var(--ink-faint);margin-top:1px}

/* ---------- Course Extras (sidebar) ---------- */
.extra-btn{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--r-sm);
  width:100%;text-align:left;font-size:13.5px;font-weight:500;color:var(--ink-soft);transition:.15s}
.extra-btn:hover{background:var(--surface-2);color:var(--ink)}
.extra-btn .e-ico{width:26px;height:26px;display:grid;place-items:center;flex:none;font-size:14px}

/* ---------- Wrap-up / contributions pages ---------- */
.wrap-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:26px;margin:18px 0;box-shadow:var(--shadow)}
.stars{display:flex;gap:6px;margin:8px 0 6px;font-size:30px}
.stars span{cursor:pointer;color:var(--line);transition:.1s}
.stars span.on{color:#F5B342}
.ta{width:100%;min-height:92px;padding:13px 15px;border:1.5px solid var(--line);border-radius:var(--r-sm);
  font-family:inherit;font-size:14.5px;resize:vertical;margin-top:6px}
.ta:focus{outline:none;border-color:var(--violet)}
.lbl-sm{font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:14px 0 4px;display:block}
.contrib-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow)}
.contrib-card .cc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.contrib-card .cc-title{font-weight:600;font-size:15px}
.contrib-card .cc-meta{font-size:11.5px;color:var(--ink-faint);font-family:'IBM Plex Mono'}
.contrib-card p{font-size:14px;color:var(--ink-soft);margin:0}

/* performance dashboard + final exam */
.perf-table{width:100%;border-collapse:collapse;margin:10px 0 4px;font-size:14px}
.perf-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);
  font-weight:600;padding:8px 10px;border-bottom:2px solid var(--line)}
.perf-table td{padding:10px 10px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
.perf-table tr:last-child td{border-bottom:none}
.perf-bar-wrap{width:100%;background:var(--surface-2);border-radius:6px;height:8px;overflow:hidden;min-width:90px}
.perf-bar{height:100%;border-radius:6px;background:var(--grad)}
.perf-pct{font-family:'IBM Plex Mono';font-size:12.5px;color:var(--ink-soft);white-space:nowrap}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin:18px 0}
.summary-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;text-align:center;box-shadow:var(--shadow)}
.summary-card .sc-val{font-family:'Space Grotesk';font-size:26px;font-weight:700;color:var(--violet)}
.summary-card .sc-lbl{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.exam-q{margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--line-soft)}
.exam-q:last-child{border-bottom:none}
.exam-q .eq-n{font-size:15.5px;font-weight:600;margin-bottom:12px;font-family:'Space Grotesk'}
.exam-opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 15px;
  border:1.5px solid var(--line);border-radius:var(--r-sm);margin-bottom:8px;background:var(--surface-2);
  transition:.14s;font-size:14px;color:var(--ink);cursor:pointer}
.exam-opt:hover{border-color:var(--violet);background:#fff}
.exam-opt.sel{border-color:var(--violet);background:rgba(108,92,231,.08)}
.exam-opt .ok{flex:none;width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);
  display:grid;place-items:center;font-family:'IBM Plex Mono';font-size:10.5px;color:var(--ink-faint)}
.exam-opt.sel .ok{background:var(--violet);border-color:transparent;color:#fff}
.exam-progress{font-size:12.5px;color:var(--ink-soft);margin-bottom:18px}
.result-banner{border-radius:var(--r);padding:28px;text-align:center;margin:18px 0}
.result-banner.pass{background:rgba(21,181,126,.08);border:1.5px solid rgba(21,181,126,.3)}
.result-banner.fail{background:rgba(233,104,60,.08);border:1.5px solid rgba(233,104,60,.3)}
.result-banner .rb-score{font-family:'Space Grotesk';font-size:44px;font-weight:700}
.result-banner.pass .rb-score{color:var(--success)}
.result-banner.fail .rb-score{color:var(--warn)}
.result-banner .rb-msg{font-size:15px;color:var(--ink-soft);margin-top:6px}
.cert-card{background:#fff;border:3px solid var(--violet);border-radius:18px;padding:50px 40px;text-align:center;
  margin:20px 0;position:relative;background-image:linear-gradient(135deg,rgba(108,92,231,.04),rgba(232,79,156,.04))}
.cert-card .cert-kicker{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--violet);font-weight:600}
.cert-card .cert-title{font-family:'Space Grotesk';font-size:30px;font-weight:700;margin:14px 0 6px}
.cert-card .cert-name{font-family:'Space Grotesk';font-size:26px;font-weight:700;background:var(--grad);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:18px 0}
.cert-card .cert-body{font-size:14.5px;color:var(--ink-soft);max-width:480px;margin:0 auto 18px}
.cert-card .cert-meta{font-size:12.5px;color:var(--ink-faint);font-family:'IBM Plex Mono';margin-top:18px}
@media print{
  .sidebar,.topbar,.hud,.narrate,.doubt,.pagenav,.btn,#toasts{display:none!important}
  .cert-card{border:3px solid #6C5CE7;box-shadow:none}
}
.empty-state{text-align:center;padding:50px 20px;color:var(--ink-faint)}
.empty-state .e-big{font-size:34px;margin-bottom:10px}

/* explainer video */
.vid-wrap{display:none;margin-bottom:26px}
.vid-wrap.open{display:block}
.vid-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.vid-card video{display:block;width:100%;border-radius:0}
.vid-card .vid-cap{font-size:12.5px;color:var(--ink-faint);text-align:center;padding:10px 14px;font-style:italic}
.narrate .watch{width:34px;height:34px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line);color:var(--violet);display:grid;place-items:center;flex:none;font-size:15px}
.narrate .watch:hover{background:var(--surface);border-color:var(--violet)}
.narrate .watch:active{transform:scale(.94)}

/* settings page */
.settings-page{max-width:560px;margin:0 auto;padding:38px 28px 90px}
.settings-page h1{font-size:28px;font-weight:700;margin-bottom:8px}
.settings-page .lead{font-size:15px;color:var(--ink-soft);margin-bottom:26px}
.s-field{margin-bottom:18px}
.s-field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.s-field select,.s-field input[type=text],.s-field input[type=password]{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--r-sm);font-family:inherit;font-size:14.5px;background:var(--surface)}
.s-field select:focus,.s-field input:focus{outline:none;border-color:var(--violet)}
.s-status{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;margin-bottom:18px}
.s-status.ok{background:rgba(21,181,126,.1);color:#0c7a52}
.s-status.no{background:rgba(233,104,60,.1);color:#b14620}
.s-hint{font-size:12.5px;color:var(--ink-faint);margin-top:6px;line-height:1.5}

/* ask-a-doubt panel */
.doubt{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin:28px 0 10px;box-shadow:var(--shadow)}
.doubt .d-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.doubt .d-badge{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;color:var(--signal)}
.doubt .d-row{display:flex;gap:10px;margin-bottom:12px}
.doubt .d-input{flex:1;padding:11px 14px;border:1.5px solid var(--line);border-radius:var(--r-sm);font-family:inherit;font-size:14px;resize:none;min-height:44px}
.doubt .d-input:focus{outline:none;border-color:var(--signal)}
.doubt .d-send{flex:none;padding:10px 18px;border-radius:var(--r-sm);background:var(--grad);color:#fff;font-weight:600;font-size:14px}
.doubt .d-send:hover{filter:brightness(1.05)}
.doubt .d-send:disabled{opacity:.5;cursor:not-allowed;filter:none}
.doubt .d-log{max-height:320px;overflow-y:auto}
.doubt .d-msg{padding:10px 14px;border-radius:var(--r-sm);margin-bottom:8px;font-size:14px;line-height:1.55}
.doubt .d-msg.user{background:rgba(17,181,196,.08);border:1px solid rgba(17,181,196,.18);color:var(--ink)}
.doubt .d-msg.tutor{background:var(--surface-2);border:1px solid var(--line);color:#28324A}
.doubt .d-msg .d-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.doubt .d-msg.user .d-label{color:var(--signal)}
.doubt .d-msg.tutor .d-label{color:var(--violet)}
.doubt .d-typing{color:var(--ink-faint);font-size:13px;font-style:italic;padding:6px 0}

 <div class="eyebrow"><span class="mono">MODULE 01</span> \u2022 Introduction</div>
 <h1>Signal from the <em>Noise</em></h1>
 <p class="lead">Every day, millions of patients generate data just by living \u2014 visiting clinics, filling prescriptions, wearing fitness trackers. This course is about turning that messy, real-world trail into evidence that helps better, safer medicines reach the people who need them.</p>

 ${narrateBar('Module 1: Introduction',0)}

 <h2>What you\u2019ll be able to do</h2>
 <p class="muted">By the end of this 50-minute course, you will be able to:</p>

   <li><span class="on">4</span><span>Recognise the standards, technologies, and people involved.</span></li>
   <li><span class="on">5</span><span>Explain how data engineering and AI \u2014 and partners like Excelra \u2014 accelerate the work.</span></li>
 </ul>

 <h2>RWD and RWE \u2014 the two ideas everything rests on</h2>
 <p>These two terms sound similar but mean different things. Get this distinction and the rest of the course clicks into place.</p>
 <div class="cards2">
   <div class="dcard rwd"><span class="dc-tag">RWD</span><h4>Real-World Data</h4>
     <p>The raw <b>data</b> itself, collected during everyday healthcare \u2014 not in a controlled study. Examples: electronic health records, insurance claims, disease registries, wearables.</p></div>
   <div class="dcard rwe"><span class="dc-tag">RWE</span><h4>Real-World Evidence</h4>
     <p>The <b>conclusions</b> about how a treatment is used, and its benefits or risks, that you get by carefully <b>analysing</b> real-world data.</p></div>
 </div>
 <div class="callout"><div class="co-t">\u{1F4A1} One-line memory hook</div>
   <p><b>Data is the ingredient; evidence is the meal.</b> RWD is the raw material. RWE is what you cook up after cleaning, combining, and analysing it.</p></div>

 <h2>Why does this matter?</h2>
 <p>Clinical trials are powerful but live in a bubble: a small, carefully selected group of patients, watched under strict conditions, for a limited time. The real world is the opposite \u2014 huge, diverse, and messy. RWD lets us ask questions a trial can\u2019t answer cheaply:</p>
 <p class="muted">Does this drug work as well in elderly patients with three other conditions? What happens after five years of use? How does it compare to the cheaper alternative doctors already prescribe? Real-world data holds the answers \u2014 if we can read them.</p>

 <h2>Where it sits in the medicine lifecycle</h2>
 <p>RWE began as a <b>post-approval</b> activity \u2014 monitoring safety once a drug was on the market. Today it stretches across the whole journey: spotting unmet needs early, supporting regulatory submissions (even standing in for a control group in some cases), and proving value to the insurers who decide what gets paid for.</p>
 <div class="diagram">

   <p>Excelra\u2019s clinical data analytics and data-engineering teams turn raw patient data into decision-ready insight \u2014 exactly the journey this course walks through. You\u2019re learning the business you\u2019re part of.</p></div>

 ${checkBlock(0)}

 ${narrateBar('Module 2: Business Overview',1)}

 <h2>What is the RWE function?</h2>
 <p>The real-world evidence function is the discipline of <b>turning everyday healthcare data into answers</b> that a clinical trial cannot, or cannot affordably, provide. It sits at the meeting point of medicine, data science, and business strategy.</p>

 <h2>Why does it exist?</h2>
 <p>A clinical trial is the gold standard for proving a drug <i>can</i> work. But it has four built-in limits:</p>
 <ul class="obj-list">
   <li><span class="on">\u2715</span><span><b>Narrow.</b> Strict eligibility rules exclude the elderly, the very sick, and people on other medications \u2014 i.e. most real patients.</span></li>
   <li><span class="on">\u2715</span><span><b>Expensive &amp; slow.</b> Trials cost hundreds of millions and take years.</span></li>
   <li><span class="on">\u2715</span><span><b>Short.</b> They usually end at approval, so long-term effects stay unknown.</span></li>
   <li><span class="on">\u2715</span><span><b>Artificial.</b> Tightly controlled conditions don\u2019t mirror busy real-world care.</span></li>
 </ul>
 <p>RWE exists to fill those gaps \u2014 to show how a medicine actually performs once it meets the messy, diverse real world.</p>

 <h2>What it\u2019s trying to achieve</h2>
 <div class="cards2">
   <div class="dcard rwd"><span class="dc-tag">REGULATORY</span><h4>Support approvals &amp; labels</h4><p>Generate evidence for new uses, post-marketing commitments, or an external control arm where a placebo group isn\u2019t ethical.</p></div>
   <div class="dcard rwe"><span class="dc-tag">MARKET ACCESS</span><h4>Prove value to payers</h4><p>Show insurers and health systems that a treatment is worth funding (the world of HEOR \u2014 health economics &amp; outcomes research).</p></div>
   <div class="dcard rwd"><span class="dc-tag">SAFETY</span><h4>Watch for risks</h4><p>Detect rare side effects across millions of patients that a small trial would never reveal.</p></div>
   <div class="dcard rwe"><span class="dc-tag">STRATEGY</span><h4>Guide decisions</h4><p>Inform medical, clinical, and commercial teams about real treatment patterns and unmet needs.</p></div>
 </div>

 <h2>Real-world relevance</h2>
 <p>Regulators like the FDA and EMA now have formal frameworks for using RWE in their decisions, and payers increasingly demand it before agreeing to pay. That shift turned RWE from a niche safety activity into a core part of how modern medicines are developed, approved, and funded.</p>
 <div class="callout magenta"><div class="co-t">\u{1F517} The Excelra connection</div>
   <p>This is squarely Excelra\u2019s territory: curating and analysing real patient data into evidence that clients use to make regulatory, access, and clinical decisions. The business need you just learned is the business Excelra serves.</p></div>

 ${checkBlock(1)}
 ${doubtPanel(1)}
 ${pageNav(1)}
`;}

/* SVG: 5-box tech pipeline (reuses pipeline-style hotspot boxes) */
function techSVG(){
  const stages=[
    {label:'Source systems',desc:'EHRs and claims platforms — where clinical data is first generated.'},
    {label:'Cloud warehouse/lake',desc:'Holds data from multiple sources so it can be processed together.'},
    {label:'Big-data processing',desc:'Spark / Databricks handle very large datasets efficiently.'},
    {label:'Standardization',desc:'OMOP / ATLAS map source data onto a common structure.'},
    {label:'Analytics & dashboards',desc:'Python / R / SQL / BI tools turn analysis into readable reports.'},
  ];
  const bw=128, bh=42, gap=14, pad=16, y=50;
  const W=pad*2+stages.length*bw+(stages.length-1)*gap;
  let boxes='', arrows='', tips='';
  stages.forEach((s,i)=>{
    const x=pad+i*(bw+gap);
    const isLast=i===stages.length-1;
    boxes+=`<rect class="tech-box" data-i="t${i}" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="10" fill="${isLast?'url(#tgrad)':'#fff'}" stroke="${isLast?'none':'var(--line)'}" stroke-width="1.5" style="cursor:pointer"/>`;
    boxes+=`<text class="tech-box" data-i="t${i}" x="${x+bw/2}" y="${y+bh/2+5}" text-anchor="middle" font-family="Space Grotesk" font-size="10.5" font-weight="600" fill="${isLast?'#fff':'#28324A'}" style="pointer-events:none">${s.label}</text>`;
    if(i<stages.length-1){
      const ax=x+bw+2, ax2=ax+gap-4;
      arrows+=`<line x1="${ax}" y1="${y+bh/2}" x2="${ax2}" y2="${y+bh/2}" stroke="var(--noise)" stroke-width="2" marker-end="url(#tarr)"/>`;
    }
    const tipW=190, tipH=46;
    const tipX=Math.min(x, W-tipW-10);
    tips+=`<g class="pip-tip" id="pip-tip-t${i}" opacity="0" style="pointer-events:none;transition:opacity .2s">
      <rect x="${tipX}" y="${y+bh+10}" width="${tipW}" height="${tipH}" rx="8" fill="var(--ink)" opacity=".92"/>
      <foreignObject x="${tipX+10}" y="${y+bh+14}" width="${tipW-20}" height="${tipH-8}">
        <p xmlns="http://www.w3.org/1999/xhtml" style="font-size:10.5px;color:#fff;line-height:1.35;margin:0;font-family:Inter,sans-serif">${s.desc}</p>
      </foreignObject>
    </g>`;
  });
  return `<svg viewBox="0 0 ${W} ${y+bh+70}" style="width:100%;height:auto" role="img" aria-label="Technology pipeline: source systems to analytics">
    <defs>
      <linearGradient id="tgrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6C5CE7"/><stop offset="1" stop-color="#E84F9C"/></linearGradient>
      <marker id="tarr" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0 0 L5 3 L0 6 Z" fill="var(--noise)"/></marker>
    </defs>
    ${arrows}${boxes}${tips}
  </svg>`;
}

function wireTechTips(){

/* SVG: 6-stage pipeline with interactive hotspot tooltips */
function pipelineSVG(){
  const stages=[
    {label:'Collect',desc:'Pull data from EHR systems, claims databases, registries, and wearables.'},
    {label:'Ingest',desc:'Bring data into one working environment so it can be handled together.'},
    {label:'Standardize',desc:'Convert to a common structure and vocabulary (e.g. OMOP, FHIR).'},
    {label:'Curate & QC',desc:'Find and fix errors, flag missing or duplicate records, document changes.'},
    {label:'Analyse',desc:'Apply statistics or analytics to answer a specific clinical question.'},
    {label:'Evidence',desc:'Package analysis into a decision a regulator, payer, or doctor can use.'},
  ];
  const bw=112, bh=42, gap=18, pad=20, y=50;
  const W=pad*2+stages.length*bw+(stages.length-1)*gap;
  let boxes='', arrows='', tips='';
  stages.forEach((s,i)=>{
    const x=pad+i*(bw+gap);
    const isLast=i===stages.length-1;
    const fill=isLast?'url(#pg)':'#fff';
    const stroke=isLast?'none':'var(--line)';
    const txtFill=isLast?'#fff':'#28324A';
    boxes+=`<rect class="pip-box" data-i="${i}" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="10" fill="${fill}" stroke="${stroke}" stroke-width="1.5" style="cursor:pointer"/>`;
    boxes+=`<text class="pip-box" data-i="${i}" x="${x+bw/2}" y="${y+bh/2+5}" text-anchor="middle" font-family="Space Grotesk" font-size="11.5" font-weight="600" fill="${txtFill}" style="pointer-events:none">${s.label}</text>`;
    if(i<stages.length-1){
      const ax=x+bw+2, ax2=ax+gap-4;
      arrows+=`<line x1="${ax}" y1="${y+bh/2}" x2="${ax2}" y2="${y+bh/2}" stroke="var(--noise)" stroke-width="2" marker-end="url(#parr)"/>`;
    }
    const tipW=200, tipH=48;
    const tipX=Math.min(x, W-tipW-10);
    tips+=`<g class="pip-tip" id="pip-tip-${i}" opacity="0" style="pointer-events:none;transition:opacity .2s">
      <rect x="${tipX}" y="${y+bh+10}" width="${tipW}" height="${tipH}" rx="8" fill="var(--ink)" opacity=".92"/>
      <foreignObject x="${tipX+10}" y="${y+bh+14}" width="${tipW-20}" height="${tipH-8}">
        <p xmlns="http://www.w3.org/1999/xhtml" style="font-size:11px;color:#fff;line-height:1.35;margin:0;font-family:Inter,sans-serif">${s.desc}</p>
      </foreignObject>
    </g>`;
  });
  return `<svg viewBox="0 0 ${W} ${y+bh+70}" style="width:100%;height:auto" role="img" aria-label="Six-stage RWD pipeline: Collect, Ingest, Standardize, Curate & QC, Analyse, Evidence">
    <defs>

    ${arrows}${boxes}${tips}
  </svg>`;
}

  const prev=i>0, nextMod=COURSE[i+1], unlocked=allChecked(i);
  return `

function isLocked(i){

  if(prev.type==='locked') return true;
  return !allChecked(i-1);
}

/* ============================================================
   WAVEFORM  (noise -> signal, also the progress bar)
============================================================ */
let WAVE_LEN=0;
function buildWave(){
  const W=1000,H=80,mid=40,pts=[];
  for(let x=0;x<=W;x+=8){
    const t=x/W;
    const amp=30*(1-t)+3*t;                 // noise calms toward the right
    const freq=t<.5?0.09:0.05;
    const noise=(Math.random()-.5)*(1-t)*10*(t<.6?1:0.2);
    const y=mid+Math.sin(x*freq)*amp*(1-t*0.3)+noise;
    pts.push([x,y]);
  }
  let d='M'+pts[0][0]+' '+pts[0][1].toFixed(1);
  for(let i=1;i<pts.length;i++) d+=' L'+pts[i][0]+' '+pts[i][1].toFixed(1);
  document.getElementById('waveBg').setAttribute('d',d);
  const fg=document.getElementById('waveFg');
  fg.setAttribute('d',d);
  WAVE_LEN=fg.getTotalLength();
  fg.style.strokeDasharray=WAVE_LEN;
  fg.style.strokeDashoffset=WAVE_LEN;
}
function setWave(frac){
  const fg=document.getElementById('waveFg');
  if(!WAVE_LEN) return;
  fg.style.transition='stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)';
  fg.style.strokeDashoffset=WAVE_LEN*(1-Math.max(0.001,frac));
}

/* ============================================================
   INTERACTIONS
============================================================ */
function go(i){
  if(typeof i==='number' && isLocked(i)){ toast('lvl','\u{1F512}','Complete the previous module first'); return; }
  state.current=i; toggleNav(false); render();
}

function getChecks(i){
  const m=COURSE[i], len=(m.checks||[]).length;
  if(!state.checks[i]||!Array.isArray(state.checks[i])){
    if(state.checks[i]!=null&&typeof state.checks[i]==='boolean'){
      state.checks[i]=[state.checks[i]];
    }else{
      state.checks[i]=new Array(len).fill(null);
    }
  }
  while(state.checks[i].length<len) state.checks[i].push(null);
  return state.checks[i];
}

function allChecked(i){
  const m=COURSE[i];
  if(!m||!m.checks||m.checks.length===0) return true;
  const r=getChecks(i);
  return r.length>0&&r.every(v=>v!=null);
}

function answer(i,qi,j){
  const m=COURSE[i], c=m.checks[qi];
  const opts=document.querySelectorAll(`#opts-${i}-${qi} .opt`);
  opts.forEach(o=>o.disabled=true);
  const correct=j===c.answer;
  opts[c.answer].classList.add('correct');
  if(!correct) opts[j].classList.add('wrong');
  const fb=document.getElementById(`fb-${i}-${qi}`);
  fb.className='kc-fb show '+(correct?'good':'bad');
  fb.innerHTML=(correct?'<b>Correct! </b>':'<b>Not quite. </b>')+c.explain;

  const results=getChecks(i);
  if(results[qi]==null){
    results[qi]=correct;
    const gain=correct?c.xp:Math.round(c.xp/2);
    addXP(gain);
    if(correct) toast('xp','\u2713','+'+gain+' XP \u2014 nice work');
    else toast('xp','\u00BD','+'+gain+' XP \u2014 keep going');
    if(allChecked(i)){
      if(!state.done[i]) state.done[i]=true;
      const nb=document.getElementById('nextBtn-'+i);
      if(nb){ nb.disabled=false; nb.querySelector('span').textContent='Next module'; }
      checkBadges(i);
    }
    renderNav(); renderHUD();
  }
  persist();
}

function addXP(n){ state.xp+=n; persist(); }

function checkBadges(i){
  const award=(k)=>{ if(!state.badges.includes(k)){ state.badges.push(k);
    toast('badge',BADGES[k].icon,'Badge unlocked: '+BADGES[k].name); } };
  if(state.done[0]) award('first');
  const totalAnswered=Object.keys(state.checks).reduce((s,k)=>{
    const arr=state.checks[k];
    return s+(Array.isArray(arr)?arr.filter(v=>v!=null).length:(arr!=null?1:0));
  },0);
  if(totalAnswered>=2) award('detective');
  if(Object.keys(state.done).length>=6) award('half');
}

============================================================ */
async function askDoubt(moduleId){
  const inp=document.getElementById('dq-'+moduleId);
  const btn=document.getElementById('ds-'+moduleId);
  const log=document.getElementById('dl-'+moduleId);
  const q=(inp.value||'').trim();
  if(!q) return;
  inp.value=''; btn.disabled=true;
  log.innerHTML+=`<div class="d-msg user"><div class="d-label">You</div>${escapeHTML(q)}</div>`;
  log.innerHTML+=`<div class="d-typing" id="dt-${moduleId}">Tutor is thinking…</div>`;
  log.scrollTop=log.scrollHeight;
  try{
    const r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({module_id:moduleId,question:q})});
    const tip=document.getElementById('dt-'+moduleId);
    if(tip) tip.remove();
    if(r.status===401){ location.href='/'; return; }
    if(r.status===429){ log.innerHTML+=`<div class="d-msg tutor"><div class="d-label">Tutor</div>Please wait a few seconds before asking again.</div>`; }
    else if(r.ok){
      const data=await r.json();
      log.innerHTML+=`<div class="d-msg tutor"><div class="d-label">Tutor</div>${escapeHTML(data.answer)}</div>`;
    }else{
      log.innerHTML+=`<div class="d-msg tutor"><div class="d-label">Tutor</div>Sorry, something went wrong. Try again.</div>`;
    }
  }catch(e){
    const tip=document.getElementById('dt-'+moduleId);
    if(tip) tip.remove();
    log.innerHTML+=`<div class="d-msg tutor"><div class="d-label">Tutor</div>Couldn’t reach the tutor — check your connection.</div>`;
  }
  btn.disabled=false;
  log.scrollTop=log.scrollHeight;
}

  }catch(e){ toast('lvl','\u26A0','Offline \u2014 couldn\u2019t save'); }
}

/* ============================================================
   PERFORMANCE DASHBOARD + FINAL EXAM + CERTIFICATE
============================================================ */
function modulePerf(i){
  const m=COURSE[i];
  if(!m.checks||m.checks.length===0) return null;
  const results=getChecks(i);
  const correct=results.filter(r=>r===true).length;
  return {correct, total:m.checks.length, pct: m.checks.length? Math.round(correct/m.checks.length*100):0};
}

function renderExamHTML(){
  const rows=COURSE.map((m,i)=>{
    const p=modulePerf(i);
    if(!p) return '';
    return `<tr>
      <td><b>${String(i+1).padStart(2,'0')}</b> &nbsp;${m.title}</td>
      <td>${p.correct} / ${p.total}</td>
      <td><div class="perf-bar-wrap"><div class="perf-bar" style="width:${p.pct}%"></div></div></td>
      <td class="perf-pct">${p.pct}%</td>
    </tr>`;
  }).join('');

  const totalQ=COURSE.reduce((s,m)=>s+(m.checks?m.checks.length:0),0);
  const totalCorrect=COURSE.reduce((s,m,i)=>{const p=modulePerf(i); return s+(p?p.correct:0);},0);
  const overallPct=totalQ? Math.round(totalCorrect/totalQ*100):0;

  const exam=state.examResult;
  const passMark=Math.round((exam&&exam.pass_mark?exam.pass_mark:0.75)*100);

  let examSection='';
  if(exam){
    examSection=`
    <div class="result-banner ${exam.passed?'pass':'fail'}">
      <div class="rb-score">${exam.score} / ${exam.total}</div>
      <div class="rb-msg">${exam.passed?`\u{1F389} You passed! (need ${passMark}%+) — your certificate is ready.`:`Not quite — you need ${passMark}%+ to pass. Give it another go.`}</div>
      <div style="margin-top:18px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        ${exam.passed?`<button class="btn prim" onclick="go('certificate')">View certificate →</button>`:''}
        <button class="btn ghost" onclick="startExam()">${exam.passed?'Retake exam':'Try again'}</button>
      </div>
    </div>`;
  }else{
    examSection=`
    <p class="muted">You’ve completed every module — nice work. When you’re ready, take the ${TEST_QUESTIONS_COUNT}-question final exam covering the whole course. You need <b>${passMark}%</b> or higher to pass and unlock your certificate.</p>
    <button class="btn prim" style="margin-top:6px" onclick="startExam()">Start final exam →</button>`;
  }

  return `
   <div class="eyebrow"><span class="mono">PERFORMANCE</span> • Dashboard &amp; Final Exam</div>
   <h1>Your <em>performance</em></h1>
   <p class="lead">Every module's knowledge-check score, plus the whole-course final exam and your certificate.</p>

   <div class="summary-row">
     <div class="summary-card"><div class="sc-val">${totalCorrect}/${totalQ}</div><div class="sc-lbl">Module Qs Correct</div></div>
     <div class="summary-card"><div class="sc-val">${overallPct}%</div><div class="sc-lbl">Module Accuracy</div></div>
     <div class="summary-card"><div class="sc-val">${state.xp}</div><div class="sc-lbl">Total XP</div></div>
     <div class="summary-card"><div class="sc-val">${exam?(exam.passed?'✓':exam.score+'/'+exam.total):'—'}</div><div class="sc-lbl">Final Exam</div></div>
   </div>

   <div class="wrap-box">
     <h3 style="margin-top:0">Module-by-module performance</h3>
     <table class="perf-table">
       <thead><tr><th>Module</th><th>Score</th><th style="width:130px">Progress</th><th></th></tr></thead>
       <tbody>${rows}</tbody>
     </table>
   </div>

   <div class="wrap-box" id="examBox">
     <h3 style="margin-top:0">Final Exam</h3>
     <div id="examBody">${examSection}</div>
   </div>
  `;
}

const TEST_QUESTIONS_COUNT=13;
let examQuestions=[], examAnswers={};

async function startExam(){
  const box=document.getElementById('examBody');
  box.innerHTML='<p class="muted">Loading exam…</p>';
  try{
    const r=await fetch('/api/test');
    examQuestions=await r.json();
    examAnswers={};
    renderExamQuestions();
  }catch(e){
    box.innerHTML='<p class="muted">Couldn’t load the exam — check your connection and try again.</p>';
  }
}

function renderExamQuestions(){
  const box=document.getElementById('examBody');
  const answeredCount=Object.keys(examAnswers).length;
  box.innerHTML=`
    <div class="exam-progress">${answeredCount} of ${examQuestions.length} answered</div>
    ${examQuestions.map((q,qi)=>`
      <div class="exam-q">
        <div class="eq-n">${qi+1}. ${q.q}</div>
        ${q.options.map((o,oi)=>`
          <button class="exam-opt ${examAnswers[q.id]===oi?'sel':''}" onclick="selectExamAnswer(${q.id},${oi})">
            <span class="ok">${String.fromCharCode(65+oi)}</span><span>${o}</span>
          </button>`).join('')}
      </div>`).join('')}
    <button class="btn prim" ${answeredCount<examQuestions.length?'disabled':''} onclick="submitExam()">Submit final exam →</button>
    ${answeredCount<examQuestions.length?`<p class="muted" style="margin-top:10px">Answer every question to submit.</p>`:''}
  `;
}

function selectExamAnswer(qid,oi){
  examAnswers[qid]=oi;
  renderExamQuestions();
}

async function submitExam(){
  const box=document.getElementById('examBody');
  box.innerHTML='<p class="muted">Scoring your exam…</p>';
  try{
    const r=await fetch('/api/test/submit',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({answers:examAnswers})});
    const result=await r.json();
    state.examResult=result; persist();
    if(result.passed){ toast('badge','\u{1F393}','Certified! You passed the final exam'); }
    else{ toast('lvl','\u{1F4DD}','Not quite — review and try again'); }
    render();
  }catch(e){
    box.innerHTML='<p class="muted">Couldn’t submit — check your connection and try again.</p><button class="btn ghost" onclick="renderExamQuestions()">Back to exam</button>';
  }
}

function renderCertificateHTML(){
  const exam=state.examResult;
  if(!exam||!exam.passed){
    return `<div class="eyebrow"><span class="mono">CERTIFICATE</span></div>
      <h1>Not unlocked <em>yet</em></h1>
      <p class="lead">Pass the final exam to unlock your certificate.</p>
      <button class="btn prim" onclick="go('exam')">Go to final exam →</button>`;
  }
  const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  return `
   <div class="eyebrow"><span class="mono">CERTIFICATE</span> • Course Complete</div>
   <h1>Your <em>certificate</em></h1>
   <p class="lead">Congratulations — print or save this as a PDF using your browser's print dialog.</p>

   <div class="cert-card">
     <div class="cert-kicker">Excelra • Life Sciences Learning</div>
     <div class="cert-title">Certificate of Completion</div>
     <p class="muted">Real-World Data &amp; Real-World Evidence</p>
     <div class="cert-name">${state.name||'Learner'}</div>
     <div class="cert-body">has successfully completed all 12 modules of the Real-World Data &amp; Real-World Evidence course and passed the final assessment with a score of <b>${exam.score}/${exam.total}</b> (${Math.round(exam.score/exam.total*100)}%).</div>
     <div class="cert-meta">Issued ${today} • Excelra RWD/RWE Learning Platform</div>
   </div>

   <button class="btn prim" onclick="window.print()">\u{1F5A8} Print / Save as PDF</button>
   <button class="btn ghost" onclick="go('exam')" style="margin-left:10px">← Back to performance</button>
  `;
}

/* ============================================================
   LEARNER CONTRIBUTIONS PAGE
============================================================ */
function renderContribHTML(){
  return `
   <div class="eyebrow"><span class="mono">COMMUNITY</span> \u2022 Learner Contributions</div>
   <h1>Knowledge from <em>past learners</em></h1>
   <p class="lead">Extra tips and facts shared by people who completed this course before you.</p>
   <div id="contribList"><div class="empty-state"><div class="e-big">\u23F3</div>Loading...</div></div>
  `;
}
async function loadContributions(){
  const host=document.getElementById('contribList');
  if(!host) return;
  try{
    const r=await fetch('/api/contributions');
    const rows=await r.json();
    if(!rows.length){ host.innerHTML=`<div class="empty-state"><div class="e-big">\u{1F4AD}</div>No contributions yet \u2014 be the first from the Wrap-Up page!</div>`; return; }
    host.innerHTML=rows.map(r=>`
      <div class="contrib-card">
        <div class="cc-head"><span class="cc-title">${escapeHTML(r.title)}</span><span class="cc-meta">${escapeHTML(r.author_name)} \u00B7 ${escapeHTML(r.created_at)}</span></div>
        <p>${escapeHTML(r.content)}</p>
      </div>`).join('');
  }catch(e){ host.innerHTML=`<div class="empty-state">Couldn\u2019t load contributions \u2014 check your connection.</div>`; }
}
function escapeHTML(s){
  const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML;
}

/* ============================================================
   AI TUTOR SETTINGS PAGE
============================================================ */
function renderSettingsHTML(){
  return `
   <div class="settings-page">
     <div class="eyebrow"><span class="mono">SETTINGS</span> • AI Tutor</div>
     <h1>AI Tutor Settings</h1>
     <p class="lead">Enter your API key so the "Ask a Doubt" tutor can answer questions in each module. The key is stored securely on the server and never shown in the browser.</p>

     <div id="sStatus"></div>

     <div class="s-field">
       <label>LLM Provider</label>
       <select id="sProvider" onchange="toggleKeyField()">
         <option value="gemini">Google Gemini (free tier)</option>
         <option value="groq">Groq (free, very fast)</option>
       </select>
       <div class="s-hint" id="sProviderHint"></div>
     </div>

     <div class="s-field" id="sKeyWrap">
       <label>API Key</label>
       <input type="password" id="sKey" placeholder="Paste your API key here">
       <div class="s-hint" id="sKeyHint"></div>
     </div>

     <button class="btn prim" style="margin-top:8px" onclick="saveSettings()">Save settings →</button>

     <div style="margin-top:28px;padding-top:20px;border-top:1px solid var(--line)">
       <h3 style="font-size:15px;margin-bottom:10px">Where to get a free key</h3>
       <ul class="obj-list">
         <li><span class="on">✦</span><span><b>Gemini</b> — go to <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--violet);font-weight:600">aistudio.google.com/app/apikey</a> and click "Create API key." It’s free.</span></li>
         <li><span class="on">✦</span><span><b>Groq</b> — go to <a href="https://console.groq.com/keys" target="_blank" style="color:var(--violet);font-weight:600">console.groq.com/keys</a> and create a free key.</span></li>
       </ul>
     </div>
   </div>`;
}

const PROVIDER_HINTS={
  gemini:'Generous free tier. Best default choice.',
  groq:'Very fast inference. Free tier available.',
};

function toggleKeyField(){
  const p=document.getElementById('sProvider').value;
  document.getElementById('sProviderHint').textContent=PROVIDER_HINTS[p]||'';
}

async function loadSettings(){
  try{
    const r=await fetch('/api/settings');
    if(!r.ok) return;
    const s=await r.json();
    document.getElementById('sProvider').value=s.llm_provider||'gemini';
    toggleKeyField();
    const st=document.getElementById('sStatus');
    if(s.has_key){
      st.innerHTML=`<div class="s-status ok">✓ API key configured (${s.api_key_masked})</div>`;
      document.getElementById('sKey').placeholder='Key saved — enter a new one to replace it';
    }else{
      st.innerHTML=`<div class="s-status no">✘ No API key set — the AI tutor won’t work until you add one</div>`;
    }
  }catch(e){}
}

async function saveSettings(){
  const provider=document.getElementById('sProvider').value;
  const key=document.getElementById('sKey').value.trim();
  if(!key){
    const st=document.getElementById('sStatus');
    const existing=st.querySelector('.s-status.ok');
    if(!existing){
      toast('lvl','⚠','Please enter an API key'); return;
    }
  }
  const body={llm_provider:provider};
  if(key) body.api_key=key;
  else{ toast('xp','✓','Provider updated (existing key kept)');
    go('settings'); return; }
  try{
    const r=await fetch('/api/settings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){ toast('xp','✓','Settings saved! The AI tutor is ready.');
      go('settings'); }
    else{ const d=await r.json(); toast('lvl','⚠',d.error||'Could not save'); }
  }catch(e){ toast('lvl','⚠','Could not reach the server'); }
}

/* ============================================================
   BOOT
============================================================ */
window.addEventListener('load',async ()=>{
  try{ buildWave(); }catch(e){ console.warn('buildWave:',e); }

  try{
    const r=await fetch('/api/me');
    if(r.status===401){ localStorage.removeItem(SAVE_KEY); location.href='/'; return; }
    const me=await r.json();
    if(me&&me.email){
      const prevEmail=state._email||'';
      if(prevEmail && prevEmail!==me.email){
        Object.keys(state).forEach(k=>delete state[k]);
        Object.assign(state,{name:'',xp:0,done:{},checks:{},badges:[],current:0,preLevel:null,postLevel:null,examResult:null});
      }
      state._email=me.email;
      state.name=me.name||'';
      state.isAdmin=!!me.is_admin;
      state.adminUnlocked=me.unlocked_modules||[];
      persist();
      const hi=document.getElementById('hiUser');
      if(hi) hi.textContent='Hi, '+(me.name||'').split(' ')[0];
      const al=document.getElementById('adminLink');
      if(al && me.is_admin) al.style.display='inline';
    }
  }catch(e){ console.warn('api/me:',e); }

  try{
    const ra=await fetch('/api/assessment');
    if(ra.ok){
      const a=await ra.json();
      if(a.pre) state.preLevel=a.pre.level;
      else state.preLevel=null;
      if(a.post) state.postLevel=a.post.level;
      else state.postLevel=null;
      persist();
    }
  }catch(e){ console.warn('api/assessment:',e); }

  try{
    const rt=await fetch('/api/test/results');
    if(rt.ok){
      const t=await rt.json();
      state.examResult=t.best?{...t.best,pass_mark:t.pass_mark}:null;
      persist();
    }
  }catch(e){ console.warn('api/test/results:',e); }

  if(!state.preLevel){ showPreGate(); }
  else{ try{ render(); }catch(e){ console.error('render:',e); } }
});
window.addEventListener('beforeunload',()=>{ try{speechSynthesis.cancel();}catch(e){} });
</script>
